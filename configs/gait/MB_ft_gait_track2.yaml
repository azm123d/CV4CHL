# General  
finetune: True
partial_train: null
frozen_backbone: True

# Traning 
fit_epochs: 5
epochs: 40
batch_size: 15
lr_backbone: 1.0e-4
lr_head: 0.005
weight_decay: 0.01
# lr_decay: 0.99

# Model
backbone: 'Gait1'
# model_version: class
maxlen: 120
dim_feat: 512
mlp_ratio: 2
depth: 5
dim_rep: 512
num_heads: 8
att_fuse: True
num_joints: 18
num_DST_joints: 18      # MotionBERT原始输入是17
hidden_dim: 2048
dropout_ratio: 0.5

# Data
# dataset: ntu60_hrnet
# data_split: xsub
# clip_len: 243
view: 'all'          # choose from ['left', 'right', 'forward', 'backward']或者'all'表示所有视角都训练
EVGS_classes: 17
CP_classes: 5

# Augmentation
flip: True
swap_leg: True
random_move: True
scale_range_train: [0.8, 1.2]
scale_range_test: [1.0, 1.0]